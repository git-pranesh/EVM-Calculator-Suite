    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Earned Value Management (EVM)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Earned Value Management is a project management technique that integrates scope, schedule, and cost data to objectively measure project performance and forecast future outcomes. It compares planned work, completed work, and actual cost to produce variances and indices that reveal whether a project is on track."
          }
        },
        {
          "@type": "Question",
          "name": "What do BAC, PV, EV, and AC mean?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "BAC is Budget at Completion, the total approved budget for the project. PV is Planned Value, the budgeted cost of work scheduled to be completed by now. EV is Earned Value, the budgeted cost of work actually performed. AC is Actual Cost, the real money spent on the work performed to date."
          }
        },
        {
          "@type": "Question",
          "name": "How do I calculate the Cost Performance Index (CPI)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cost Performance Index is calculated by dividing Earned Value by Actual Cost: CPI = EV / AC. A CPI greater than or equal to 1.0 indicates the project is on or under budget, while a CPI less than 1.0 indicates the project is over budget."
          }
        },
        {
          "@type": "Question",
          "name": "How do I calculate the Schedule Performance Index (SPI)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Schedule Performance Index is calculated by dividing Earned Value by Planned Value: SPI = EV / PV. A SPI greater than or equal to 1.0 means the project is on or ahead of schedule, while a SPI less than 1.0 means the project is behind schedule."
          }
        },
        {
          "@type": "Question",
          "name": "What is Estimate at Completion (EAC) and how is it calculated?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Estimate at Completion is the forecasted total cost of the project given current performance. The most common formula is EAC = BAC / CPI, which assumes the current cost performance will continue to the end of the project."
          }
        },
        {
          "@type": "Question",
          "name": "Is this EVM Calculator free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, this EVM Calculator is completely free to use. There is no signup, no paywall, and no data is collected from users. All calculations happen locally in your browser."
          }
        }
      ]
    }
